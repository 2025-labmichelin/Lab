document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   --font-mono:'Space Mono',monospace;\n  }\n  html{scroll-behavior:smooth;scroll-padding-top:120px}\n  body{margin:0;background:var(--paper)}\n  @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}\n  .hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:end}\n  @media(max-width:900px){.hero-grid{grid-template-columns:1fr;gap:32px;align-items:start}}\n  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ rootRef }}\" style=\"background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden\">\n\n  <div ref=\"{{ progressRef }}\" style=\"position:fixed;top:0;left:0;height:3px;width:0;background:var(--accent);z-index:1001\"><\u002Fdiv>\n\n  <header style=\"position:fixed;top:0;left:0;width:100%;z-index:1000;background:color-mix(in srgb,var(--paper) 82%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border)\">\n    <div style=\"width:90%;max-width:1280px;margin:auto;height:74px;display:flex;align-items:center;justify-content:space-between;gap:24px\">\n      <a href=\"#topo\" style=\"text-decoration:none;color:var(--ink);font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.01em;display:flex;align-items:center;gap:10px\">\n        <span style=\"width:11px;height:11px;border-radius:3px;background:var(--accent);display:inline-block;transform:rotate(45deg)\"><\u002Fspan>Ricardo Michelin\n      <\u002Fa>\n      <nav style=\"display:flex;gap:30px;flex-wrap:wrap;justify-content:flex-end;font-family:var(--font-mono);font-size:13px;letter-spacing:1px;text-transform:uppercase\">\n        <a data-nav=\"#sobre\" href=\"#sobre\" style=\"text-decoration:none;color:var(--gray);transition:color .25s\" style-hover=\"color:var(--accent)\">Sobre<\u002Fa>\n        <a data-nav=\"#projetos\" href=\"#projetos\" style=\"text-decoration:none;color:var(--gray);transition:color .25s\" style-hover=\"color:var(--accent)\">Projetos<\u002Fa>\n        <a data-nav=\"#competencias\" href=\"#competencias\" style=\"text-decoration:none;color:var(--gray);transition:color .25s\" style-hover=\"color:var(--accent)\">Competências<\u002Fa>\n        <a data-nav=\"#experiencia\" href=\"#experiencia\" style=\"text-decoration:none;color:var(--gray);transition:color .25s\" style-hover=\"color:var(--accent)\">Experiência<\u002Fa>\n        <a data-nav=\"#contato\" href=\"#contato\" style=\"text-decoration:none;color:var(--gray);transition:color .25s\" style-hover=\"color:var(--accent)\">Contato<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main id=\"topo\">\n\n    <section style=\"min-height:100vh;display:flex;flex-direction:column;padding-top:74px\">\n      <div style=\"flex:1;display:flex;align-items:center;width:100%\">\n        <div style=\"width:90%;max-width:1280px;margin:auto;padding:60px 0\">\n          <span style=\"font-family:var(--font-mono);font-size:12.5px;font-weight:700;letter-spacing:3px;color:var(--accent);text-transform:uppercase;display:block;margin-bottom:34px\">Portfólio · IA aplicada a negócio<\u002Fspan>\n          <div class=\"hero-grid\">\n            <h1 style=\"font-family:var(--font-display);font-size:clamp(56px,9vw,150px);line-height:.85;letter-spacing:-.05em;font-weight:700;text-transform:uppercase;margin:0\">Strategy<br><span style=\"color:var(--accent)\">Matters<\u002Fspan><\u002Fh1>\n            <div style=\"padding-bottom:10px\">\n              <p style=\"font-family:var(--font-display);font-size:clamp(22px,2.5vw,32px);line-height:1.28;font-weight:500;margin:0\">People buy stories, not products.<\u002Fp>\n              <p style=\"font-family:var(--font-display);font-size:clamp(22px,2.5vw,32px);line-height:1.28;font-weight:500;margin:0\">Design the story.<\u002Fp>\n              <p style=\"font-family:var(--font-display);font-size:clamp(22px,2.5vw,32px);line-height:1.28;font-weight:700;color:var(--accent);margin:0 0 26px\">Deliver the impact.<\u002Fp>\n              <p style=\"color:var(--gray);font-size:17px;max-width:420px;margin:0\">Projetos, Produtos e Inteligência Artificial aplicados à geração de resultados.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:54px;display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:12px;letter-spacing:2px;color:var(--gray);text-transform:uppercase\">\n            <span>Role para explorar<\u002Fspan>\n            <span style=\"font-size:20px;color:var(--accent);animation:bob 1.8s ease-in-out infinite\">↓<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showMarquee }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:var(--ink);overflow:hidden;white-space:nowrap;padding:17px 0\">\n          <div style=\"display:inline-flex;width:max-content;animation:mq 30s linear infinite\">\n            <sc-for list=\"{{ marquee }}\" as=\"m\" hint-placeholder-count=\"8\">\n              <span style=\"display:inline-flex;align-items:center;gap:13px;padding:0 26px;font-family:var(--font-mono);font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--paper)\"><span style=\"width:7px;height:7px;background:var(--accent);transform:rotate(45deg);display:inline-block\"><\u002Fspan>{{ m }}<\u002Fspan>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ marquee }}\" as=\"m\" hint-placeholder-count=\"8\">\n              <span style=\"display:inline-flex;align-items:center;gap:13px;padding:0 26px;font-family:var(--font-mono);font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--paper)\"><span style=\"width:7px;height:7px;background:var(--accent);transform:rotate(45deg);display:inline-block\"><\u002Fspan>{{ m }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <section id=\"sobre\" style=\"padding:130px 0;border-top:1px solid var(--border)\">\n      <div style=\"width:90%;max-width:1280px;margin:auto\">\n        <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n          <span style=\"font-family:var(--font-mono);font-size:13px;letter-spacing:2px;color:var(--accent)\">01<\u002Fspan>\n          <span style=\"height:1px;width:46px;background:var(--accent-line)\"><\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:3px;color:var(--gray);text-transform:uppercase\">Sobre<\u002Fspan>\n        <\u002Fdiv>\n        <h2 data-reveal=\"\" style=\"font-family:var(--font-display);font-size:clamp(40px,6vw,72px);line-height:1.02;letter-spacing:-.03em;font-weight:700;margin:0 0 16px\">IA que deixa a operação eficiente<\u002Fh2>\n        <p data-reveal=\"\" style=\"color:var(--gray);font-size:18.5px;max-width:640px;margin:0 0 52px\">18 anos entregando projetos em TI, telecom e contact center. Hoje uso IA para deixar a operação mais eficiente, ligando negócio, cliente e tecnologia em soluções que funcionam de verdade.<\u002Fp>\n        <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,330px),1fr));gap:48px;align-items:start\">\n          <div>\n            <p style=\"margin:0 0 18px;font-size:17px\">Crio soluções com IA para CX, produto e operações: da URA inteligente integrada ao CRM aos agentes via MCP que tiram o trabalho manual repetitivo da equipe. O foco é sempre eficiência operacional e experiência do cliente.<\u002Fp>\n            <p style=\"margin:0;font-size:17px\">Meu diferencial é <strong style=\"color:var(--ink);font-weight:700\">ligar negócio, cliente e tecnologia em soluções que funcionam de verdade<\u002Fstrong>. Uso Value Stream Mapping para enxergar o processo, cortar etapas sem valor e acelerar entregas, sempre conectando a tecnologia ao resultado.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <div style=\"background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px\"><b style=\"display:block;font-family:var(--font-display);font-weight:700;font-size:17px;margin-bottom:3px\">18 anos de experiência<\u002Fb><span style=\"color:var(--gray);font-size:14px\">TI, telecom e contact center<\u002Fspan><\u002Fdiv>\n            <div style=\"background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px\"><b style=\"display:block;font-family:var(--font-display);font-weight:700;font-size:17px;margin-bottom:3px\">Foco atual<\u002Fb><span style=\"color:var(--gray);font-size:14px\">IA para CX, produto e operações<\u002Fspan><\u002Fdiv>\n            <div style=\"background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px\"><b style=\"display:block;font-family:var(--font-display);font-weight:700;font-size:17px;margin-bottom:3px\">Como trabalho<\u002Fb><span style=\"color:var(--gray);font-size:14px\">Do diagnóstico ao go-live, em blocos<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"projetos\" style=\"padding:130px 0;border-top:1px solid var(--border)\">\n      <div style=\"width:90%;max-width:1280px;margin:auto\">\n        <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n          <span style=\"font-family:var(--font-mono);font-size:13px;letter-spacing:2px;color:var(--accent)\">02<\u002Fspan>\n          <span style=\"height:1px;width:46px;background:var(--accent-line)\"><\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:3px;color:var(--gray);text-transform:uppercase\">Projetos<\u002Fspan>\n        <\u002Fdiv>\n        <h2 data-reveal=\"\" style=\"font-family:var(--font-display);font-size:clamp(40px,6vw,72px);line-height:1.02;letter-spacing:-.03em;font-weight:700;margin:0 0 16px\">Projetos<\u002Fh2>\n        <p data-reveal=\"\" style=\"color:var(--gray);font-size:18.5px;max-width:640px;margin:0 0 52px\">Soluções que construí, da automação de atendimento à eficiência operacional.<\u002Fp>\n        <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px\">\n          <sc-for list=\"{{ projetos }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div style=\"background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px;transition:transform .28s,box-shadow .28s,border-color .28s\" style-hover=\"transform:translateY(-6px);border-color:var(--accent);box-shadow:0 22px 50px color-mix(in srgb,var(--accent) 16%,transparent)\">\n              <span style=\"display:inline-block;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:6px 12px;border-radius:30px;margin-bottom:18px\">{{ p.tag }}<\u002Fspan>\n              <h3 style=\"font-family:var(--font-display);font-size:20px;font-weight:600;margin:0 0 12px;line-height:1.3\">{{ p.title }}<\u002Fh3>\n              <p style=\"color:var(--gray);font-size:15px;margin:0\">{{ p.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"competencias\" style=\"padding:130px 0;border-top:1px solid var(--border)\">\n      <div style=\"width:90%;max-width:1280px;margin:auto\">\n        <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n          <span style=\"font-family:var(--font-mono);font-size:13px;letter-spacing:2px;color:var(--accent)\">03<\u002Fspan>\n          <span style=\"height:1px;width:46px;background:var(--accent-line)\"><\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:3px;color:var(--gray);text-transform:uppercase\">Competências<\u002Fspan>\n        <\u002Fdiv>\n        <h2 data-reveal=\"\" style=\"font-family:var(--font-display);font-size:clamp(40px,6vw,72px);line-height:1.02;letter-spacing:-.03em;font-weight:700;margin:0 0 16px\">Competências<\u002Fh2>\n        <p data-reveal=\"\" style=\"color:var(--gray);font-size:18.5px;max-width:640px;margin:0 0 52px\">Três camadas que se conectam: IA, gestão e experiência do cliente.<\u002Fp>\n        <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px\">\n          <sc-for list=\"{{ competencias }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <div style=\"background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px\">\n              <h3 style=\"display:flex;align-items:center;gap:11px;font-family:var(--font-display);font-size:19px;font-weight:600;margin:0 0 20px\"><span style=\"width:10px;height:10px;border-radius:3px;background:var(--accent);display:inline-block;transform:rotate(45deg)\"><\u002Fspan>{{ g.title }}<\u002Fh3>\n              <div style=\"display:flex;flex-wrap:wrap;gap:9px\">\n                <sc-for list=\"{{ g.chips }}\" as=\"c\" hint-placeholder-count=\"5\">\n                  <span style=\"font-size:13px;color:var(--gray);background:var(--paper);border:1px solid var(--border);border-radius:30px;padding:7px 14px\">{{ c }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"experiencia\" style=\"padding:130px 0;border-top:1px solid var(--border)\">\n      <div style=\"width:90%;max-width:1280px;margin:auto\">\n        <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n          <span style=\"font-family:var(--font-mono);font-size:13px;letter-spacing:2px;color:var(--accent)\">04<\u002Fspan>\n          <span style=\"height:1px;width:46px;background:var(--accent-line)\"><\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:3px;color:var(--gray);text-transform:uppercase\">Experiência<\u002Fspan>\n        <\u002Fdiv>\n        <h2 data-reveal=\"\" style=\"font-family:var(--font-display);font-size:clamp(40px,6vw,72px);line-height:1.02;letter-spacing:-.03em;font-weight:700;margin:0 0 16px\">Experiência<\u002Fh2>\n        <p data-reveal=\"\" style=\"color:var(--gray);font-size:18.5px;max-width:640px;margin:0 0 52px\">Trajetória em TI, telecom e contact center.<\u002Fp>\n        <div data-reveal=\"\" style=\"border-left:3px solid var(--accent);padding-left:40px;display:flex;flex-direction:column;gap:24px\">\n          <sc-for list=\"{{ experiencia }}\" as=\"e\" hint-placeholder-count=\"5\">\n            <div style=\"position:relative;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px 28px\">\n              <span style=\"position:absolute;left:-51px;top:28px;width:16px;height:16px;border-radius:50%;background:var(--paper);border:4px solid var(--accent)\"><\u002Fspan>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px\">\n                <div style=\"font-family:var(--font-display);font-size:18px;font-weight:600\">{{ e.role }} · <span style=\"color:var(--accent)\">{{ e.company }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:5px 13px;border-radius:30px;white-space:nowrap\">{{ e.date }}<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"color:var(--gray);font-size:15px;margin:0\">{{ e.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n pan style=\"color:var(--accent);font-weight:600;font-size:14px;word-break:break-all\">{{ c.label }}<\u002Fspan>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <footer style=\"text-align:center;padding:42px;border-top:1px solid var(--border);color:var(--gray);font-family:var(--font-mono);font-size:12px;letter-spacing:1px\">© 2026 RICARDO MICHELIN<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Electric Blue&quot;,&quot;Violet&quot;,&quot;Tangerine&quot;,&quot;Crimson&quot;],&quot;default&quot;:&quot;Electric Blue&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showMarquee&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;animations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n  progressRef = React.createRef();\n\n  accentMap = {\n    'Electric Blue': '#1F4DF0',\n    'Violet': '#5B2BEA',\n    'Tangerine': '#E8531F',\n    'Crimson': '#E0214A'\n  };\n\n  applyAccent() {\n    const root = this.rootRef.current;\n    if (!root) return;\n    const a = this.accentMap[this.props.accent] || this.accentMap['Electric Blue'];\n    root.style.setProperty('--accent', a);\n  }\n\n  componentDidMount() {\n    this.applyAccent();\n    const root = this.rootRef.current;\n    if (!root) return;\n\n    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const animate = (this.props.animations !== false) && !reduce;\n\n    const items = Array.from(root.querySelectorAll('[data-reveal]'));\n    if (animate && 'IntersectionObserver' in window) {\n      items.forEach(el => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(26px)';\n        el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n      });\n      const obs = new IntersectionObserver(ents => {\n        ents.forEach(en => {\n          if (en.isIntersecting) {\n            en.target.style.opacity = '1';\n            en.target.style.transform = 'none';\n            obs.unobserve(en.target);\n          }\n        });\n      }, { threshold: 0.12 });\n      items.forEach(el => obs.observe(el));\n      this._obs = obs;\n    }\n\n    const links = Array.from(root.querySelectorAll('[data-nav]'));\n    const secs = links.map(l => document.querySelector(l.getAttribute('data-nav')));\n    this._onScroll = () => {\n      const y = window.scrollY;\n      const h = document.documentElement.scrollHeight - window.innerHeight;\n      if (this.progressRef.current) this.progressRef.current.style.width = (h > 0 ? (y / h * 100) : 0) + '%';\n      const pos = y + 170;\n      let cur = -1;\n      secs.forEach((s, i) => { if (s && s.offsetTop <= pos) cur = i; });\n      links.forEach((l, i) => { l.style.color = i === cur ? 'var(--accent)' : 'var(--gray)'; });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentDidUpdate() {\n    this.applyAccent();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._obs) this._obs.disconnect();\n  }\n\n  renderVals() {\n    return {\n      rootRef: this.rootRef,\n      progressRef: this.progressRef,\n      showMarquee: this.props.showMarquee !== false,\n      marquee: ['IA Generativa', 'Governança de IA', 'Agentes & MCP', 'RAG', 'Gestão de Projetos', 'CX & Telecom', 'Transformação Digital', 'LLM via API'],\n      projetos: [\n        { tag: 'CX · Automação', title: 'Central de Atendimento Inteligente', desc: 'URA automatizada integrada ao Zoho Desk que aciona o plantonista fora do horário comercial. Reduziu custo e melhorou a experiência do cliente.' },\n        { tag: 'IA · Agentes', title: 'Agentes de IA para tarefas administrativas', desc: 'Em estudo: agentes virtuais integrados via MCP para executar tarefas e eliminar o trabalho manual repetitivo da equipe.' },\n        { tag: 'Operações · Dados', title: 'Eficiência operacional por dados', desc: 'Projetos de diretoria com Value Stream Mapping para mapear processos, cortar etapas sem valor e acelerar entregas.' }\n      ],\n      competencias: [\n        { title: 'Inteligência Artificial', chips: ['Agentes de IA', 'MCP', 'LLM', 'Prompt Engineering'] },\n        { title: 'Contact Center', chips: ['Genesys', 'Avaya', 'Talkdesk', 'Twilio', 'Zoho', 'Cisco', 'KHOMP'] },\n        { title: 'Gestão', chips: ['Scrum', 'PMBOK', 'Roadmap de Produto', 'OKR', 'PSPO I'] }\n      ],\n      experiencia: [\n        { role: 'Gerente de Projetos', company: 'Wittel', date: '2021 — hoje', desc: 'Carteira de ~10 projetos simultâneos. Times de 7 a 15 pessoas, passando de 15 nos mais complexos.' },\n        { role: 'Analista de Projetos', company: 'Betta Global Partner', date: '2017 — 2021', desc: 'Planejamento e controle de projetos do começo ao fim: escopo, custo, cronograma e indicadores de desempenho.' },\n        { role: 'Coordenador de Serviços', company: 'JUST4IT', date: '2014 — 2016', desc: 'Liderança da equipe técnica de TI e telecom. SLA, prioridades e projetos de implantação de sistemas.' },\n        { role: 'Analista de Telecom e Contact Center', company: 'Europ Assistance · GVT · Actionline · Comm', date: '2008 — 2014', desc: 'Atuação em telecom e contact center, base da trajetória em CX e operações.' }\n      ],\n      contatos: [\n        { tag: 'LinkedIn', title: 'Conecte-se', href: 'https://linkedin.com/in/ricardomichelin', label: 'linkedin.com/in/ricardomichelin' },\n        { tag: 'Localização', title: 'Onde estou', href: 'https://maps.google.com/?q=São Paulo, SP', label: 'São Paulo, SP' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
